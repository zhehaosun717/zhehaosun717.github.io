# 个人简介
content: |
  Welcome to my website. I am an Interactive Designer & Game Developer trained at Savannah College of Art and Design. As a creative designer, I focus on merging tech with storytelling, drawing from elements of ancient Chinese culture and redefining them in service of games.

  I excel in game art, shader-based interactions & simulation flow of UX, due to the mentorships & lab work I've done. I explore generation-based art and always intended career runs by genuine and contributive interest.
